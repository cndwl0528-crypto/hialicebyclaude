version: '3.8'

services:
  # HiAlice Application (Frontend + Backend)
  hialice-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hialice-app
    ports:
      - "3001:3001"
    environment:
      # Backend
      - NODE_ENV=production
      - PORT=3001
      - API_URL=http://localhost:3001

      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}

      # AI Engine
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Speech & Audio (Optional)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}

      # Auth
      - JWT_SECRET=${JWT_SECRET:-hialice-dev-secret-change-in-prod}

    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hialice-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database (for local development)
  postgres:
    image: postgres:16-alpine
    container_name: hialice-db
    environment:
      - POSTGRES_USER=${DB_USER:-hialice}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-hialice-dev-password}
      - POSTGRES_DB=${DB_NAME:-hialice_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - hialice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hialice"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  hialice-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
